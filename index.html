<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  
</head>
<body>
  <div class="card">
    <div class="img">
      <img src="/Financial_growth-removebg-preview.png" alt="">GrowFinance</div>
    <h1>Login</h1>
    <div class="username">
    <i class="fa-solid fa-circle-user"></i>
    <input id="loginUser" type="text" placeholder="username">
    </div>
    <div class="password">
      <i class="fa-solid fa-lock"></i>
      <input id="loginPassword" type="password" placeholder="password">
    </div>
   <p>Don't have an account?<a id="register" href="#">Register</a></p>
   <button id="login">Login</button>
  </div>
  <div class="card1">
    <div class="card">
    <div class="img">
      <img src="/Financial_growth-removebg-preview.png" alt="">GrowFinance</div>
    <h1>SignIn</h1>
    <div class="username">
    <i class="fa-solid fa-circle-user"></i>
    <input id="user" type="text" placeholder="username">
    </div>
    <div class="password">
      <i class="fa-solid fa-lock"></i>
      <input id="password" type="password" placeholder="password">
    </div>
    <p>Already an account?<a id="sign" href="#">Login</a></p>
   <button id="signin">SignIn</button>
    </div>
  </div>
  <div class="dashboard">
    <div class="options">
      <div class="top">
        <div class="left-opt">
          <img src="/Financial_growth-removebg-preview.png" alt="">
        GrowFinance <hr></div>
        <div class="right">
          <i class="fa-solid fa-x"></i>
        </div>
      </div>
      <div class="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="search">
        <i class="fa-solid fa-x"></i>
       
       
      </div>
    </div>
    <div class="nav"></div>
    <div class="earning"></div>
    <div class="spending"></div>
    <div class="graph"></div>
    <div class="reset"></div>
    <div class="transactions"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
